name: Auto OTA Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone repo
      - uses: actions/checkout@v3

      # 2. Node 20 (مهم)
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. Install Expo + EAS CLI
      - name: Install Expo CLI
        run: npm install -g expo-cli eas-cli@latest

      # 5. Verify secrets (مهم جداً)
      - name: Verify required secrets
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN is missing"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::EXPO_PUBLIC_SUPABASE_URL is missing"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::EXPO_PUBLIC_SUPABASE_ANON_KEY is missing"
            exit 1
          fi

      # 6. Run OTA update 🚀
      - name: Run OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: CI=1 npx eas update --branch production --message "auto update from ${{ github.sha }}"
